<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7900 • MOON OR DUST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .hero {
            background: linear-gradient(180deg, #39ff14 10%, #000 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            padding: 2rem;
        }
        
        /* UÇAN CASHCAT'LER */
        .cashcat {
            position: absolute;
            width: 100px;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            animation: flyAndSpin linear infinite;
            opacity: 0.9;
            filter: drop-shadow(0 0 20px #39ff14);
            z-index: 1;
        }
        
        @keyframes flyAndSpin {
            0% { transform: translateY(120vh) rotate(0deg); }
            100% { transform: translateY(-120vh) rotate(1440deg); }
        }
        
        .logo {
            width: 420px;
            filter: drop-shadow(0 0 60px #39ff14);
            z-index: 2;
        }
        
        h1 {
            font-family: 'Impact', sans-serif;
            font-size: 7rem;
            font-weight: 900;
            margin: 10px 0 5px;
            color: #000;
            text-shadow: 0 0 30px #39ff14, 4px 4px 0 #39ff14;
            z-index: 2;
        }
        
        .subtitle {
            font-size: 2.3rem;
            margin: 0 0 20px;
            color: #39ff14;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        p {
            max-width: 700px;
            font-size: 1.55rem;
            margin: 15px 0;
            z-index: 2;
        }
        
        .btn {
            margin-top: 30px;
            padding: 18px 55px;
            font-size: 1.7rem;
            font-weight: bold;
            background: #39ff14;
            color: black;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 40px #39ff14;
            transition: 0.4s;
            z-index: 2;
        }
        
        .btn:hover {
            transform: scale(1.12);
        }
    </style>
</head>
<body>
    <div class="hero">
        <!-- CashCat Resimleri -->
        <div class="cashcat" style="left: 8%;  background-image: url('cashcat.png'); animation-duration: 16s;"></div>
        <div class="cashcat" style="left: 18%; background-image: url('cashcat.png'); animation-duration: 23s; animation-delay: -5s;"></div>
        <div class="cashcat" style="left: 28%; background-image: url('cashcat.png'); animation-duration: 14s; animation-delay: -12s;"></div>
        <div class="cashcat" style="left: 42%; background-image: url('cashcat.png'); animation-duration: 25s; animation-delay: -8s;"></div>
        <div class="cashcat" style="left: 55%; background-image: url('cashcat.png'); animation-duration: 18s; animation-delay: -15s;"></div>
        <div class="cashcat" style="left: 68%; background-image: url('cashcat.png'); animation-duration: 21s; animation-delay: -3s;"></div>
        <div class="cashcat" style="left: 80%; background-image: url('cashcat.png'); animation-duration: 19s;"></div>
        <div class="cashcat" style="left: 90%; background-image: url('cashcat.png'); animation-duration: 27s; animation-delay: -10s;"></div>

        <img src="7900.png" alt="7900 Logo" class="logo">
        
        <h1>7900</h1>
        <p class="subtitle">MOON OR DUST</p>
        <p><strong>7900 $CASHCAT holders special airdrop.</strong></p>
        <p>All creator tokens distributed.<br>
        <span style="color:#39ff14; font-weight:900;">Now send it to the moon.</span></p>
        
        <a href="https://robinhoodchain.blockscout.com/token/0x020bfC650A365f8BB26819deAAbF3E21291018b4" 
           target="_blank" class="btn">
            VIEW ON BLOCKSCOUT →
        </a>
    </div>
    
    <footer style="padding:2rem; opacity:0.7;">
        7900 TOKEN • ROBINHOOD CHAIN
    </footer>
</body>
</html>
